<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow,noarchive">
<title>YST 営業管理アプリ</title>
<style>
  :root{
    --bg:#f4f6fb; --panel:#ffffff; --ink:#1f2533; --sub:#697089;
    --line:#e4e8f1; --accent:#4f46e5; --accent-soft:#eef0fe;
    --s0:#9aa3b8; --s1:#3b82f6; --s2:#f59e0b; --s3:#8b5cf6; --s4:#16a34a; --s5:#ef4444;
    --shadow:0 1px 3px rgba(20,30,60,.08),0 6px 20px rgba(20,30,60,.05);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic UI","Meiryo",system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;-webkit-font-smoothing:antialiased}
  .app{display:flex;min-height:100vh}
  /* sidebar */
  .side{width:212px;background:#161b2e;color:#cdd3e6;display:flex;flex-direction:column;position:fixed;top:0;bottom:0;left:0;padding:18px 0}
  .brand{padding:0 20px 16px;font-weight:700;font-size:17px;color:#fff;letter-spacing:.5px}
  .brand small{display:block;font-weight:400;font-size:11px;color:#7f88a6;margin-top:3px}
  .nav{flex:1;overflow:auto}
  .nav button{width:100%;text-align:left;background:none;border:none;color:#aab1cc;padding:11px 20px;font-size:13.5px;cursor:pointer;display:flex;align-items:center;gap:10px;border-left:3px solid transparent}
  .nav button:hover{background:#1f2540;color:#fff}
  .nav button.active{background:#1f2540;color:#fff;border-left-color:var(--accent)}
  .nav .ico{width:18px;text-align:center}
  .side .foot{padding:14px 20px;border-top:1px solid #262c47;font-size:11px;color:#6f779a}
  .side .foot button{background:#262c47;color:#cdd3e6;border:none;border-radius:6px;padding:6px 10px;font-size:11px;cursor:pointer;margin-top:6px}
  /* main */
  .main{margin-left:212px;flex:1;padding:26px 32px 60px}
  .head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
  .head h1{font-size:20px;margin:0}
  .head .desc{color:var(--sub);font-size:12.5px;margin-top:4px}
  /* cards */
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:22px}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 18px;box-shadow:var(--shadow)}
  .kpi .lbl{font-size:12px;color:var(--sub)}
  .kpi .num{font-size:26px;font-weight:700;margin-top:6px}
  .kpi .num small{font-size:13px;color:var(--sub);font-weight:500}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px 20px;box-shadow:var(--shadow);margin-bottom:20px}
  .panel h2{font-size:15px;margin:0 0 14px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--line);vertical-align:middle}
  th{font-size:11.5px;color:var(--sub);font-weight:600;background:#fafbff;position:sticky;top:0}
  tr:hover td{background:#fafbff}
  .pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;color:#fff;white-space:nowrap}
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
  .tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
  .tab{padding:8px 16px;border-radius:8px;border:1px solid var(--line);background:#fff;cursor:pointer;font-size:13px;font-weight:600;color:var(--sub)}
  .tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .tab .cnt{font-size:11px;opacity:.75;margin-left:5px}
  input,select,textarea{font-family:inherit;font-size:13px;border:1px solid var(--line);border-radius:8px;padding:8px 10px;background:#fff;color:var(--ink)}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
  .btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer}
  .btn:hover{filter:brightness(1.07)}
  .btn.ghost{background:#fff;color:var(--accent);border:1px solid var(--accent)}
  .btn.sm{padding:5px 10px;font-size:12px}
  .btn.danger{background:#fff;color:var(--s5);border:1px solid #f2c9c9}
  .search{flex:1;min-width:180px}
  .muted{color:var(--sub)}
  .right{margin-left:auto}
  .pager{display:flex;gap:8px;align-items:center;justify-content:flex-end;margin-top:12px;font-size:12.5px;color:var(--sub)}
  .pager button{border:1px solid var(--line);background:#fff;border-radius:7px;padding:5px 11px;cursor:pointer;font-size:12.5px}
  .pager button:disabled{opacity:.4;cursor:default}
  .barwrap{background:#eef1f7;border-radius:6px;height:22px;overflow:hidden;display:flex}
  .barwrap span{display:flex;align-items:center;justify-content:center;color:#fff;font-size:10.5px;font-weight:600}
  /* modal */
  .ov{position:fixed;inset:0;background:rgba(20,26,45,.45);display:none;align-items:flex-start;justify-content:center;padding:40px 16px;z-index:50;overflow:auto}
  .ov.show{display:flex}
  .modal{background:#fff;border-radius:14px;width:100%;max-width:560px;padding:22px 24px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .modal h3{margin:0 0 16px;font-size:17px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .fld{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
  .fld label{font-size:12px;color:var(--sub);font-weight:600}
  .fld.full{grid-column:1/3}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:8px}
  .acts{margin-top:6px;max-height:180px;overflow:auto;border:1px solid var(--line);border-radius:8px}
  .acts .row{display:flex;gap:8px;padding:7px 10px;border-bottom:1px solid var(--line);font-size:12px;align-items:center}
  .acts .row:last-child{border-bottom:none}
  .acts .t{font-weight:600}
  .empty{padding:40px;text-align:center;color:var(--sub)}
  .pl-item{border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start}
  .pl-item .meta{flex:1}
  .pl-item a{color:var(--accent);word-break:break-all}
  .tag{display:inline-block;background:var(--accent-soft);color:var(--accent);padding:2px 9px;border-radius:6px;font-size:11px;font-weight:600;margin-right:6px}
  .funnel td{font-variant-numeric:tabular-nums}
  textarea{resize:vertical;min-height:120px;width:100%}
  .chip{padding:4px 10px;border-radius:18px;background:#eef1f7;font-size:12px;display:inline-flex;align-items:center;gap:6px;margin:0 6px 6px 0}
  .chip button{border:none;background:none;color:var(--s5);cursor:pointer;font-size:13px;padding:0}
  .mtabs{display:flex;gap:2px;border-bottom:1px solid var(--line);margin-bottom:14px;flex-wrap:wrap}
  .mtab{background:none;border:none;padding:8px 11px;font-size:12.5px;font-weight:600;color:var(--sub);cursor:pointer;border-bottom:2px solid transparent}
  .mtab.active{color:var(--accent);border-bottom-color:var(--accent)}
  .hist{border:1px solid var(--line);border-radius:8px;padding:9px 11px;margin-bottom:8px}
  .hrow{display:flex;gap:8px;align-items:center;flex-wrap:wrap;font-size:12px}
  .hbody{white-space:pre-wrap;background:#fafbff;border:1px solid var(--line);border-radius:6px;padding:9px;font-size:11.5px;margin:6px 0 0;font-family:inherit;line-height:1.55}
  select.msel{padding:4px 6px;font-size:12px;max-width:104px}
  .modal{max-width:620px}
  h4{margin:0;font-size:13px}
  details summary{outline:none}
  @media(max-width:760px){.side{width:60px}.brand small,.nav .lbltxt{display:none}.main{margin-left:60px;padding:18px}.grid2{grid-template-columns:1fr}.fld.full{grid-column:1}}
</style>
</head>
<body>
<!-- ===== 簡易パスワードゲート（社外秘保護）。パスワードは下の var PASSWORD を書き換えて変更できます ===== -->
<div id="lockgate" style="position:fixed;inset:0;background:#161b2e;display:flex;align-items:center;justify-content:center;z-index:99999;font-family:'Hiragino Kaku Gothic ProN','Yu Gothic UI','Meiryo',system-ui,sans-serif">
  <div style="background:#fff;padding:30px 32px;border-radius:14px;max-width:340px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4)">
    <div style="font-weight:700;font-size:19px;color:#1f2533">YST 営業管理</div>
    <div style="color:#697089;font-size:12.5px;margin:6px 0 18px">関係者用｜パスワードを入力してください</div>
    <input id="lockpw" type="password" autofocus placeholder="パスワード" onkeydown="if(event.key==='Enter')unlockApp()" style="width:100%;padding:10px 12px;border:1px solid #e4e8f1;border-radius:8px;font-size:14px;box-sizing:border-box">
    <div id="lockerr" style="color:#ef4444;font-size:12px;height:16px;margin:7px 0"></div>
    <button onclick="unlockApp()" style="width:100%;background:#4f46e5;color:#fff;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:600;cursor:pointer">入室する</button>
    <div style="color:#9aa3b8;font-size:11px;margin-top:16px;line-height:1.5">※社外秘情報を含みます。<br>関係者以外の閲覧・転載はご遠慮ください。</div>
  </div>
</div>
<script>
  var PASSWORD="yst2026";
  function unlockApp(){
    if(document.getElementById('lockpw').value===PASSWORD){
      var g=document.getElementById('lockgate'); if(g) g.parentNode.removeChild(g);
    }else{
      document.getElementById('lockerr').textContent='パスワードが違います';
      document.getElementById('lockpw').value='';
    }
  }
</script>
<div class="app">
  <aside class="side">
    <div class="brand">YST 営業管理<small>ターゲット & パイプライン</small></div>
    <nav class="nav" id="nav"></nav>
    <div class="foot">
      データは端末に自動保存
      <button onclick="exportAll()">バックアップ書出</button>
      <button onclick="resetAll()">初期化</button>
    </div>
  </aside>
  <main class="main" id="main"></main>
</div>

<div class="ov" id="ov"><div class="modal" id="modal"></div></div>

    `<button class="${view===k?'active':''}" onclick="go('${k}')"><span class="ico">${i}</span><span class="lbltxt">${l}</span></button>`).join('');
}
function go(v){view=v;page=1;q='';fStage='';fLeader='';render();}

/* ---------- render router ---------- */
function render(){renderNav();const m=document.getElementById('main');
  if(view==='dashboard')m.innerHTML=vDashboard();
  else if(view==='targets')m.innerHTML=vTargets();
  else if(view==='pamphlets')m.innerHTML=vPamphlets();
  else if(view==='plans')m.innerHTML=vPlans();
  else if(view==='insights')m.innerHTML=vInsights();
  else if(view==='members')m.innerHTML=vMembers();
}

/* ---------- dashboard ---------- */
function counts(list){const c={};STAGES.forEach(s=>c[s]=0);list.forEach(t=>c[t.stage]++);return c}
function vDashboard(){
  const all=state.targets, c=counts(all);
  const active=all.length-c['失注'];
  const won=c['受注'], deal=c['商談']+c['契約']+c['受注'];
  const approached=all.length-c['未着手']-c['失注'];
  let html=`<div class="head"><div><h1>KPIダッシュボード</h1>
    <div class="desc">全${all.length}社のパイプライン状況（${new Date().toLocaleDateString('ja-JP')}時点）</div></div></div>`;
  html+=`<div class="kpis">
    <div class="kpi"><div class="lbl">総ターゲット</div><div class="num">${all.length}<small>社</small></div></div>
    <div class="kpi"><div class="lbl">アプローチ済</div><div class="num">${approached}<small>社</small></div></div>
    <div class="kpi"><div class="lbl">商談以降</div><div class="num">${deal}<small>社</small></div></div>
    <div class="kpi"><div class="lbl">受注</div><div class="num" style="color:var(--s4)">${won}<small>社</small></div></div>
    <div class="kpi"><div class="lbl">受注率</div><div class="num">${all.length?(won/all.length*100).toFixed(1):0}<small>%</small></div></div>
  </div>`;
  // funnel overall
  html+=`<div class="panel"><h2>全体ファネル</h2>${funnelBar(c,all.length)}</div>`;
  // per industry table
  html+=`<div class="panel"><h2>業種別 進捗・KPI</h2>
    <table class="funnel"><thead><tr><th>業種</th><th>社数</th>`+
    STAGES.map(s=>`<th>${s}</th>`).join('')+`<th>受注率</th><th>受注目標</th><th>達成率</th></tr></thead><tbody>`;
  INDS.forEach(ind=>{
    const list=byInd(ind),cc=counts(list),goal=state.goals[ind]||0;
    const rate=list.length?(cc['受注']/list.length*100).toFixed(1):'0.0';
    const ach=goal?(cc['受注']/goal*100).toFixed(0):'—';
    html+=`<tr><td><b>${ind}</b></td><td>${list.length}</td>`+
      STAGES.map(s=>`<td>${cc[s]||0}</td>`).join('')+
      `<td>${rate}%</td><td><input type="number" min="0" style="width:64px" value="${goal}" onchange="setGoal('${ind}',this.value)"></td>`+
      `<td>${ach==='—'?'—':ach+'%'}</td></tr>`;
  });
  html+=`</tbody></table></div>`;
  return html;
}
function funnelBar(c,total){
  if(!total)return '<div class="muted">データなし</div>';
  return STAGES.map(s=>{
    const n=c[s]||0,pct=(n/total*100);
    return `<div style="margin-bottom:9px"><div style="font-size:12px;margin-bottom:3px">${s} <span class="muted">${n}社 (${pct.toFixed(0)}%)</span></div>
      <div class="barwrap"><span style="width:${Math.max(pct,3)}%;background:${STAGE_COLOR[s]}">${n}</span></div></div>`;
  }).join('');
}
function setGoal(ind,v){state.goals[ind]=parseInt(v)||0;save();}

/* ---------- targets ---------- */
function vTargets(){
  let html=`<div class="head"><div><h1>ターゲット管理</h1>
    <div class="desc">業種を選び、商談ステージ・担当者を更新できます</div></div>
    <button class="btn" onclick="openTarget()">＋ ターゲット追加</button></div>`;
  html+=`<div class="tabs">`+INDS.map(ind=>
    `<div class="tab ${curInd===ind?'active':''}" onclick="setInd('${ind}')">${ind}<span class="cnt">${byInd(ind).length}</span></div>`).join('')+`</div>`;
  // toolbar
  html+=`<div class="toolbar">
    <input class="search" placeholder="🔍 企業名・住所・メモで検索" value="${esc(q)}" oninput="q=this.value;page=1;refreshTbl()">
    <select onchange="fStage=this.value;page=1;refreshTbl()"><option value="">全ステージ</option>`+
      STAGES.map(s=>`<option ${fStage===s?'selected':''}>${s}</option>`).join('')+`</select>
    <select onchange="fLeader=this.value;page=1;refreshTbl()"><option value="">全リーダー</option>`+
      leaders().map(m=>`<option ${fLeader===m?'selected':''}>${esc(m)}</option>`).join('')+`</select>
    <button class="btn ghost sm right" onclick="exportCSV()">CSV出力</button></div>`;
  html+=`<div class="panel" style="padding:0;overflow:auto"><div id="tblwrap"></div></div>`;
  setTimeout(refreshTbl,0);
  return html;
}
function setInd(ind){curInd=ind;page=1;q='';fStage='';fLeader='';render();}
function filtered(){
  let list=byInd(curInd);
  if(q){const k=q.toLowerCase();list=list.filter(t=>(t.name+t.address+t.note+t.phone).toLowerCase().includes(k))}
  if(fStage)list=list.filter(t=>t.stage===fStage);
  if(fLeader)list=list.filter(t=>t.leader===fLeader);
  return list;
}
const PER=25;
function refreshTbl(){
  const wrap=document.getElementById('tblwrap');if(!wrap)return;
  const list=filtered();const pages=Math.max(1,Math.ceil(list.length/PER));
  if(page>pages)page=pages;
  const rows=list.slice((page-1)*PER,page*PER);
  if(!list.length){wrap.innerHTML=`<div class="empty">該当するターゲットがありません</div>`;return;}
  let h=`<table><thead><tr><th style="width:26%">企業名</th><th>ステージ</th><th>リーダー</th><th>担当</th><th>連絡先</th><th>最終活動</th><th></th></tr></thead><tbody>`;
  rows.forEach(t=>{
    const la=lastTouch(t);
    h+=`<tr>
      <td><b>${esc(t.name)}</b><div class="muted" style="font-size:11px;margin-top:2px">${esc(t.note).slice(0,42)}</div></td>
      <td><select onchange="quickStage('${t.id}',this.value)" style="border-color:${STAGE_COLOR[t.stage]}">`+
        STAGES.map(s=>`<option ${t.stage===s?'selected':''}>${s}</option>`).join('')+`</select></td>
      <td>${memSelect('quickLeader',t.id,t.leader)}</td>
      <td>${memSelect('quickAssignee',t.id,t.assignee)}</td>
      <td style="font-size:11.5px">${t.phone?esc(t.phone):''}${t.email?'<br>'+esc(t.email):''}${!t.phone&&!t.email?'<span class="muted">—</span>':''}</td>
      <td style="font-size:11.5px">${la?esc(la.l)+'<br><span class="muted">'+la.d+'</span>':'<span class="muted">—</span>'}</td>
      <td><button class="btn sm ghost" onclick="openTarget('${t.id}')">開く</button></td>
    </tr>`;
  });
  h+=`</tbody></table>`;
  h+=`<div class="pager" style="padding:10px 14px">全${list.length}件
    <button ${page<=1?'disabled':''} onclick="page--;refreshTbl()">前へ</button>
    <span>${page} / ${pages}</span>
    <button ${page>=pages?'disabled':''} onclick="page++;refreshTbl()">次へ</button></div>`;
  wrap.innerHTML=h;
}
function quickStage(id,v){const t=state.targets.find(x=>x.id===id);t.stage=v;t.updatedAt=Date.now();save();refreshTbl()}
function quickLeader(id,v){const t=state.targets.find(x=>x.id===id);t.leader=v;t.updatedAt=Date.now();save();}
function quickAssignee(id,v){const t=state.targets.find(x=>x.id===id);t.assignee=v;t.updatedAt=Date.now();save();}
function memSelect(fn,id,val){
  const opts=['',...state.members];
  if(val&&!opts.includes(val))opts.push(val);
  return `<select class="msel" onchange="${fn}('${id}',this.value)">`+
    opts.map(m=>`<option value="${esc(m)}" ${m===val?'selected':''}>${m?esc(m):'—'}</option>`).join('')+`</select>`;
}
function lastTouch(t){
  let arr=[];
  (t.comms||[]).forEach(c=>arr.push({d:c.date||'',l:c.kind+'('+c.status+')'}));
  (t.minutes||[]).forEach(m=>arr.push({d:m.date||'',l:'議事録'}));
  (t.activities||[]).forEach(a=>arr.push({d:a.date||'',l:a.type}));
  if(!arr.length)return null;
  arr.sort((a,b)=>(a.d<b.d?1:-1));
  return arr[0];
}
function exportCSV(){
  const list=filtered();
  const head=['業種','企業名','ステージ','リーダー','担当','電話','メール','住所','URL','メモ'];
  const rows=list.map(t=>[t.industry,t.name,t.stage,t.leader,t.assignee,t.phone,t.email,t.address,t.url,t.note]);
  const csv='﻿'+[head,...rows].map(r=>r.map(c=>'"'+String(c||'').replace(/"/g,'""')+'"').join(',')).join('\r\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download=curInd+'_ターゲット.csv';a.click();
}

/* ---------- target modal (add/edit) : tabbed ---------- */
function curT(){return mTargetId?state.targets.find(x=>x.id===mTargetId):null;}
function openTarget(id){mTargetId=id||null;mTab='基本';renderModal();document.getElementById('ov').classList.add('show');}
function renderModal(){
  const t=curT(), isNew=!t;
  const o=t||{id:'',industry:curInd,name:'',phone:'',email:'',address:'',url:'',note:'',stage:'未着手',leader:'',assignee:''};
  let h=`<h3>${isNew?'ターゲット追加':esc(o.name)+'<span class="muted" style="font-size:12px;font-weight:400"> ／ '+esc(o.industry)+'</span>'}</h3>`;
  if(!isNew){
    const tabs=[['基本','基本情報'],['送付','送付準備'],['商談','オンライン商談'],['議事録','議事録']];
    h+=`<div class="mtabs">`+tabs.map(([k,l])=>`<button class="mtab ${mTab===k?'active':''}" onclick="mGo('${k}')">${l}</button>`).join('')+`</div>`;
  }
  if(isNew||mTab==='基本') h+=basicForm(o);
  else if(mTab==='送付') h+=commForm(t,['パンフ郵送','メール']);
  else if(mTab==='商談') h+=commForm(t,['オンライン商談']);
  else if(mTab==='議事録') h+=minutesForm(t);
  if(isNew||mTab==='基本'){
    h+=`<div class="modal-actions">
      ${!isNew?`<button class="btn danger" style="margin-right:auto" onclick="delTarget('${o.id}')">削除</button>`:''}
      <button class="btn ghost" onclick="closeOv()">閉じる</button>
      <button class="btn" onclick="saveTarget('${isNew?'':o.id}')">${isNew?'追加':'保存'}</button></div>`;
  }else{
    h+=`<div class="modal-actions"><button class="btn ghost" onclick="closeOv()">閉じる</button></div>`;
  }
  document.getElementById('modal').innerHTML=h;
  if(!isNew&&(mTab==='送付'||mTab==='商談')) setTimeout(genComm,0);
}
function mGo(tab){
  const t=curT();
  const nm=document.getElementById('f_name');
  if(t&&nm&&nm.value.trim()){applyBasic(t);save();}
  mTab=tab;renderModal();
}
function basicForm(o){
  const memOpts=v=>`<option value=""></option>`+state.members.map(m=>`<option ${v===m?'selected':''}>${esc(m)}</option>`).join('');
  return `<div class="grid2">
      <div class="fld full"><label>企業名 *</label><input id="f_name" value="${esc(o.name)}"></div>
      <div class="fld"><label>業種</label><select id="f_ind">`+INDS.map(i=>`<option ${o.industry===i?'selected':''}>${i}</option>`).join('')+`</select></div>
      <div class="fld"><label>ステージ</label><select id="f_stage">`+STAGES.map(s=>`<option ${o.stage===s?'selected':''}>${s}</option>`).join('')+`</select></div>
      <div class="fld"><label>アクションリーダー</label><select id="f_leader">${memOpts(o.leader)}</select></div>
      <div class="fld"><label>アクション担当</label><select id="f_assignee">${memOpts(o.assignee)}</select></div>
      <div class="fld"><label>電話</label><input id="f_phone" value="${esc(o.phone)}"></div>
      <div class="fld"><label>メール</label><input id="f_email" value="${esc(o.email)}"></div>
      <div class="fld full"><label>住所</label><input id="f_address" value="${esc(o.address)}"></div>
      <div class="fld full"><label>URL</label><input id="f_url" value="${esc(o.url)}"></div>
      <div class="fld full"><label>メモ</label><textarea id="f_note" style="min-height:60px">${esc(o.note)}</textarea></div>
    </div>`;
}
function applyBasic(t){
  const g=x=>{const e=document.getElementById(x);return e?e.value.trim():null};
  const map={f_name:'name',f_ind:'industry',f_stage:'stage',f_leader:'leader',f_assignee:'assignee',f_phone:'phone',f_email:'email',f_address:'address',f_url:'url',f_note:'note'};
  for(const id in map){const v=g(id);if(v!==null)t[map[id]]=v;}
  t.updatedAt=Date.now();
}
/* --- merge & 送付/商談 準備 --- */
function merge(s,t){return (s||'')
  .replace(/\{会社名\}/g,t.name||'').replace(/\{担当\}/g,t.assignee||t.leader||'')
  .replace(/\{リーダー\}/g,t.leader||'').replace(/\{業種\}/g,t.industry||'')
  .replace(/\{住所\}/g,t.address||'').replace(/\{メール\}/g,t.email||'').replace(/\{電話\}/g,t.phone||'');}
function commForm(t,kinds){
  const meeting=kinds.includes('オンライン商談');
  let h=`<div class="muted" style="font-size:12px;margin-bottom:8px">${meeting?'商談アジェンダを準備して履歴に残せます。':'パンフ郵送・メールを送付直前まで準備し、履歴に残せます（アウトバウンド管理）。'}差込：{会社名}{担当}{業種}{住所}{メール}</div>`;
  h+=`<div class="toolbar" style="margin-bottom:8px">
    <select id="c_kind" onchange="genComm()">`+kinds.map(k=>`<option>${k}</option>`).join('')+`</select>
    <input type="date" id="c_date" value="${today()}">
    <button class="btn sm ghost" onclick="genComm()">テンプレ生成</button></div>`;
  h+=`<div class="fld"><label>件名 / タイトル</label><input id="c_subject"></div>`;
  if(meeting){
    h+=`<div class="grid2"><div class="fld"><label>形式</label><input id="c_form" placeholder="Zoom / Teams / 電話"></div>
      <div class="fld"><label>参加者</label><input id="c_attend" placeholder="先方／自社"></div></div>`;
  }
  h+=`<div class="fld"><label>本文 / アジェンダ</label><textarea id="c_body" style="min-height:150px"></textarea></div>`;
  h+=`<div class="toolbar">
    <button class="btn sm ghost" onclick="copyComm()">コピー</button>`;
  if(!meeting) h+=`<button class="btn sm ghost" onclick="openMail('${t.id}')">メール作成</button>`;
  h+=`<button class="btn sm ghost" onclick="saveComm('${t.id}','準備')">準備として保存</button>
    <button class="btn sm" onclick="saveComm('${t.id}','${meeting?'実施済':'送付済'}')">${meeting?'実施済で記録':'送付済で記録'}</button></div>`;
  const list=t.comms.filter(c=>kinds.includes(c.kind));
  h+=`<h4 style="margin:16px 0 6px">履歴（${list.length}件）</h4>`+commHist(t,kinds);
  return h;
}
function genComm(){
  const t=curT();if(!t)return;
  const k=document.getElementById('c_kind');if(!k)return;
  const tpl=state.templates[k.value]||{subject:'',body:''};
  document.getElementById('c_subject').value=merge(tpl.subject,t);
  document.getElementById('c_body').value=merge(tpl.body,t);
}
function copyComm(){
  const s=document.getElementById('c_subject').value+'\n\n'+document.getElementById('c_body').value;
  if(navigator.clipboard){navigator.clipboard.writeText(s);alert('件名と本文をコピーしました');}
}
function openMail(id){
  const t=state.targets.find(x=>x.id===id);
  const sub=encodeURIComponent(document.getElementById('c_subject').value);
  const body=encodeURIComponent(document.getElementById('c_body').value);
  window.location.href=`mailto:${encodeURIComponent(t.email||'')}?subject=${sub}&body=${body}`;
}
function saveComm(id,status){
  const t=state.targets.find(x=>x.id===id);
  const fe=x=>{const e=document.getElementById(x);return e?e.value:''};
  t.comms.push({id:uid(),kind:fe('c_kind'),status,date:fe('c_date'),subject:fe('c_subject'),body:fe('c_body'),form:fe('c_form'),attend:fe('c_attend'),createdAt:Date.now()});
  t.updatedAt=Date.now();save();renderModal();
}
function commHist(t,kinds){
  const list=t.comms.filter(c=>kinds.includes(c.kind)).slice().reverse();
  if(!list.length)return '<div class="muted" style="padding:8px">履歴はまだありません</div>';
  return list.map(c=>{
    const done=c.status!=='準備';
    return `<div class="hist"><div class="hrow">
      <span class="pill" style="background:${done?'var(--s4)':'var(--s2)'}">${c.status}</span>
      <b>${esc(c.kind)}</b><span class="muted">${c.date||''}</span>
      <span class="muted" style="flex:1">${esc(c.subject||'')}${c.form?' / '+esc(c.form):''}</span>
      ${!done?`<button class="btn sm" onclick="commDone('${t.id}','${c.id}')">${kinds.includes('オンライン商談')?'実施済に':'送付済に'}</button>`:''}
      <button class="btn sm danger" onclick="delComm('${t.id}','${c.id}')">削除</button></div>
      ${c.body?`<details><summary class="muted" style="font-size:11px;cursor:pointer">本文を表示</summary><pre class="hbody">${esc(c.body)}</pre></details>`:''}</div>`;
  }).join('');
}
function commDone(tid,cid){const t=state.targets.find(x=>x.id===tid);const c=t.comms.find(x=>x.id===cid);c.status=(c.kind==='オンライン商談'?'実施済':'送付済');save();renderModal();}
function delComm(tid,cid){const t=state.targets.find(x=>x.id===tid);t.comms=t.comms.filter(x=>x.id!==cid);save();renderModal();}
/* --- 議事録 --- */
const SENTIMENTS=['◎ 好感触','○ 前向き','△ 普通','▲ 難航','× ネガティブ'];
const MIN_KINDS=['商談','オンライン商談','コール','訪問','その他'];
function minutesForm(t){
  let h=`<div class="grid2">
    <div class="fld"><label>日付</label><input type="date" id="m_date" value="${today()}"></div>
    <div class="fld"><label>種別</label><select id="m_kind">`+MIN_KINDS.map(k=>`<option>${k}</option>`).join('')+`</select></div>
    <div class="fld"><label>参加者</label><input id="m_attend" placeholder="先方／自社"></div>
    <div class="fld"><label>所感（手応え）</label><select id="m_sent">`+SENTIMENTS.map(k=>`<option>${k}</option>`).join('')+`</select></div></div>
    <div class="fld"><label>議事概要</label><textarea id="m_summary" style="min-height:90px" placeholder="決定事項・先方の反応・課題・要望など"></textarea></div>
    <div class="fld"><label>ネクストアクション</label><input id="m_next" placeholder="例：6/10までに見積提出 / 担当へ再架電"></div>
    <div class="toolbar"><button class="btn sm" onclick="addMinute('${t.id}')">議事録を保存</button></div>`;
  h+=`<h4 style="margin:16px 0 6px">議事録（${t.minutes.length}件）</h4>`+minHist(t);
  return h;
}
function addMinute(id){
  const t=state.targets.find(x=>x.id===id);
  const g=x=>{const e=document.getElementById(x);return e?e.value:''};
  if(!g('m_summary').trim()){alert('議事概要を入力してください');return;}
  t.minutes.push({id:uid(),date:g('m_date'),kind:g('m_kind'),attend:g('m_attend'),sentiment:g('m_sent'),summary:g('m_summary'),next:g('m_next'),createdAt:Date.now()});
  t.updatedAt=Date.now();save();renderModal();
}
function minHist(t){
  if(!t.minutes.length)return '<div class="muted" style="padding:8px">議事録はまだありません</div>';
  return t.minutes.slice().reverse().map(m=>`<div class="hist">
    <div class="hrow"><span class="pill" style="background:var(--accent)">${esc(m.kind)}</span>
      <span class="muted">${m.date||''}</span><span style="flex:1">${esc(m.sentiment||'')}${m.attend?' / '+esc(m.attend):''}</span>
      <button class="btn sm danger" onclick="delMinute('${t.id}','${m.id}')">削除</button></div>
    <div style="font-size:12.5px;margin:5px 0;white-space:pre-wrap">${esc(m.summary)}</div>
    ${m.next?`<div class="muted" style="font-size:12px">▶ 次：${esc(m.next)}</div>`:''}</div>`).join('');
}
function delMinute(tid,mid){const t=state.targets.find(x=>x.id===tid);t.minutes=t.minutes.filter(x=>x.id!==mid);save();renderModal();}
function saveTarget(id){
  const nm=document.getElementById('f_name');
  if(!nm||!nm.value.trim()){alert('企業名を入力してください');return;}
  if(id){const t=state.targets.find(x=>x.id===id);applyBasic(t);save();render();renderModal();
    document.getElementById('ov').classList.add('show');
  }else{
    const t={id:uid(),name:'',industry:curInd,stage:'未着手',leader:'',assignee:'',phone:'',email:'',address:'',url:'',note:'',activities:[],comms:[],minutes:[],updatedAt:Date.now()};
    applyBasic(t);state.targets.push(t);curInd=t.industry;
    save();closeOv();render();
  }
}
function delTarget(id){if(confirm('このターゲットを削除しますか？')){state.targets=state.targets.filter(x=>x.id!==id);save();closeOv();render();}}
function closeOv(){document.getElementById('ov').classList.remove('show')}
document.getElementById('ov').addEventListener('click',e=>{if(e.target.id==='ov')closeOv()});

/* ---------- pamphlets ---------- */
function vPamphlets(){
  let html=`<div class="head"><div><h1>パンフレット</h1>
    <div class="desc">業種別の提案資料・パンフレットのリンクや所在を管理</div></div></div>`;
  html+=`<div class="tabs">`+INDS.map(ind=>
    `<div class="tab ${curInd===ind?'active':''}" onclick="curInd='${ind}';render()">${ind}<span class="cnt">${(state.pamphlets[ind]||[]).length}</span></div>`).join('')+`</div>`;
  const list=state.pamphlets[curInd]||[];
  html+=`<div class="panel"><h2>${curInd}業界向け 資料</h2>`;
  html+= list.length? list.map((p,i)=>`<div class="pl-item">
      <div class="meta"><span class="tag">資料</span><b>${esc(p.title)}</b>
      ${p.url?`<div style="margin-top:5px"><a href="${esc(p.url)}" target="_blank">${esc(p.url)}</a></div>`:''}
      ${p.note?`<div class="muted" style="margin-top:5px">${esc(p.note)}</div>`:''}
      ${p.fileData?`<div style="margin-top:6px">📎 <a href="${p.fileData}" download="${esc(p.fileName)}" style="color:var(--accent);font-weight:600">${esc(p.fileName)||'添付ファイル'}</a> <span class="muted" style="font-size:11px">（クリックで保存）</span></div>`:''}</div>
      <button class="btn danger sm" onclick="delPamph('${curInd}',${i})">削除</button></div>`).join('')
    : `<div class="empty">まだ資料が登録されていません</div>`;
  html+=`<div style="border-top:1px solid var(--line);margin-top:12px;padding-top:14px">
    <div class="grid2">
      <div class="fld"><label>資料タイトル</label><input id="p_title" placeholder="例：介護業界向け 特定技能 提案資料"></div>
      <div class="fld"><label>リンクURL（任意）</label><input id="p_url" placeholder="https:// または ファイルの場所"></div>
      <div class="fld full"><label>メモ（任意）</label><input id="p_note" placeholder="対象・バージョン・用途など"></div>
      <div class="fld full"><label>ファイル添付（任意・PDF/画像/Word/PPT等｜目安3MBまで）</label><input type="file" id="p_file"></div>
    </div><button class="btn" onclick="addPamph()">＋ 資料を追加</button>
    <div class="muted" style="font-size:11px;margin-top:7px">※ 添付ファイルはこの端末のブラウザ内に保存されます（他の人とは共有されません）。大きい資料や全員で共有したい資料は、リンクURLでの登録を推奨します。</div></div></div>`;
  return html;
}
function saveSafe(){
  try{ localStorage.setItem(KEY,JSON.stringify(state)); return true; }
  catch(e){ alert('保存容量の上限を超えたため保存できませんでした。添付ファイルが大きすぎる可能性があります。容量の小さいファイルにするか、リンクURLでの登録をご利用ください。'); return false; }
}
function addPamph(){
  const t=document.getElementById('p_title').value.trim();
  if(!t){alert('タイトルを入力してください');return;}
  const url=document.getElementById('p_url').value.trim();
  const note=document.getElementById('p_note').value.trim();
  const fi=document.getElementById('p_file');
  const file=fi&&fi.files&&fi.files[0];
  const commit=(fileData,fileName,fileType)=>{
    const arr=(state.pamphlets[curInd]=state.pamphlets[curInd]||[]);
    arr.push({title:t,url:url,note:note,fileData:fileData||'',fileName:fileName||'',fileType:fileType||''});
    if(!saveSafe()){ arr.pop(); return; }
    render();
  };
  if(file){
    if(file.size>3*1024*1024){alert('ファイルが大きすぎます（3MBまで）。大きい資料はリンクURLでの共有を推奨します。');return;}
    const r=new FileReader();
    r.onload=function(){ commit(r.result,file.name,file.type); };
    r.onerror=function(){ alert('ファイルの読み込みに失敗しました。'); };
    r.readAsDataURL(file);
  }else{
    commit();
  }
}
function delPamph(ind,i){state.pamphlets[ind].splice(i,1);save();render();}

/* ---------- action plans ---------- */
function vPlans(){
  let html=`<div class="head"><div><h1>アクションプラン</h1>
    <div class="desc">業種別の営業戦略・アクション方針を記入。下部に関連イベント一覧。</div></div></div>`;
  html+=`<div class="tabs">`+INDS.map(ind=>
    `<div class="tab ${curInd===ind?'active':''}" onclick="curInd='${ind}';render()">${ind}</div>`).join('')+`</div>`;
  html+=`<div class="panel"><h2>${curInd}業界 アクションプラン</h2>
    <textarea id="planbox" placeholder="例）&#10;・優先ターゲット上位20社にパンフ送付（〜6月）&#10;・メディカルジャパン出展でリード獲得→コール&#10;・商談化したら事業団へクロスセル提案">${esc(state.plans[curInd]||'')}</textarea>
    <div style="margin-top:10px"><button class="btn" onclick="savePlan()">保存</button>
    <span id="plansaved" class="muted" style="margin-left:10px"></span></div></div>`;
  html+=`<div class="panel"><h2>関連イベント（参考）</h2><table><thead><tr><th>イベント名</th><th>日程</th><th>会場</th><th>特徴</th></tr></thead><tbody>`+
    (state.events||[]).map(e=>`<tr><td><b>${esc(e.name)}</b></td><td>${esc(e.date)}</td><td>${esc(e.venue)}</td><td style="font-size:12px">${esc(e.note)}</td></tr>`).join('')+
    `</tbody></table></div>`;
  return html;
}
function savePlan(){state.plans[curInd]=document.getElementById('planbox').value;save();
  document.getElementById('plansaved').textContent='✓ 保存しました';setTimeout(()=>{const e=document.getElementById('plansaved');if(e)e.textContent=''},2000);}

/* ---------- members / settings ---------- */
function vMembers(){
  let html=`<div class="head"><div><h1>担当者・設定</h1>
    <div class="desc">アクションリーダー／担当として選択できるメンバーを登録</div></div></div>`;
  html+=`<div class="panel"><h2>メンバー（${state.members.length}名）</h2><div>`+
    (state.members.length?state.members.map((m,i)=>`<span class="chip">${esc(m)}<button onclick="delMember(${i})">✕</button></span>`).join(''):'<span class="muted">未登録</span>')+`</div>
    <div class="toolbar" style="margin-top:14px"><input id="m_name" class="search" placeholder="メンバー名を入力（例：前田）" onkeydown="if(event.key==='Enter')addMember()"><button class="btn" onclick="addMember()">＋ 追加</button></div>
    <div class="muted" style="font-size:12px;margin-top:6px">※ ここで登録した名前が、ターゲット一覧・編集画面のリーダー／担当のプルダウンに表示されます（初期登録：柳・木下・宮崎・石橋・中森）。自由入力も可能です。</div></div>`;
  // テンプレート編集
  html+=`<div class="panel"><h2>送付・商談テンプレート</h2>
    <div class="muted" style="font-size:12px;margin-bottom:10px">差込コード：<b>{会社名} {担当} {業種} {住所} {メール} {電話}</b> が各ターゲットの値に置換されます。</div>`;
  ['パンフ郵送','メール','オンライン商談'].forEach(k=>{
    const tp=state.templates[k]||{subject:'',body:''};
    html+=`<div style="border:1px solid var(--line);border-radius:8px;padding:12px;margin-bottom:10px">
      <div style="font-weight:600;margin-bottom:6px">${k}</div>
      <div class="fld"><label>件名</label><input id="tpl_s_${k}" value="${esc(tp.subject)}"></div>
      <div class="fld"><label>本文</label><textarea id="tpl_b_${k}" style="min-height:110px">${esc(tp.body)}</textarea></div>
      <button class="btn sm" onclick="saveTpl('${k}')">保存</button>
      <span id="tplsaved_${k}" class="muted" style="margin-left:8px;font-size:12px"></span></div>`;
  });
  html+=`</div>`;
  //担当者別 負荷
  const byL={};state.targets.forEach(t=>{if(t.leader)byL[t.leader]=(byL[t.leader]||0)+1});
  html+=`<div class="panel"><h2>リーダー別 担当社数</h2>`;
  const ks=Object.keys(byL);
  html+= ks.length? `<table><thead><tr><th>リーダー</th><th>担当社数</th><th>受注</th></tr></thead><tbody>`+
    ks.map(k=>{const won=state.targets.filter(t=>t.leader===k&&t.stage==='受注').length;
      return `<tr><td>${esc(k)}</td><td>${byL[k]}</td><td>${won}</td></tr>`}).join('')+`</tbody></table>`
    : `<div class="muted">担当者が割り当てられたターゲットはまだありません</div>`;
  html+=`</div>`;
  return html;
}
function addMember(){const v=document.getElementById('m_name').value.trim();if(!v)return;
  if(!state.members.includes(v))state.members.push(v);save();render();}
function delMember(i){state.members.splice(i,1);save();render();}
function saveTpl(k){state.templates[k]={subject:document.getElementById('tpl_s_'+k).value,body:document.getElementById('tpl_b_'+k).value};save();
  const e=document.getElementById('tplsaved_'+k);if(e){e.textContent='✓ 保存しました';setTimeout(()=>{e.textContent=''},2000);}}

/* ---------- insights / analysis ---------- */
function allComms(){const r=[];state.targets.forEach(t=>t.comms.forEach(c=>r.push({...c,tname:t.name,ind:t.industry,leader:t.leader,assignee:t.assignee})));return r;}
function allMins(){const r=[];state.targets.forEach(t=>t.minutes.forEach(m=>r.push({...m,tname:t.name,ind:t.industry,leader:t.leader,assignee:t.assignee})));return r;}
function ym(d){return (d||'').slice(0,7)}
function vInsights(){
  const thisMonth=today().slice(0,7);
  let comms=allComms(), mins=allMins();
  if(fInsInd){comms=comms.filter(c=>c.ind===fInsInd);mins=mins.filter(m=>m.ind===fInsInd);}
  if(fInsMem){comms=comms.filter(c=>c.leader===fInsMem||c.assignee===fInsMem);mins=mins.filter(m=>m.leader===fInsMem||m.assignee===fInsMem);}
  const prep=comms.filter(c=>c.status==='準備').length;
  const sentMonth=comms.filter(c=>c.status!=='準備'&&(c.kind==='パンフ郵送'||c.kind==='メール')&&ym(c.date)===thisMonth).length;
  const meetMonth=comms.filter(c=>c.kind==='オンライン商談'&&c.status==='実施済'&&ym(c.date)===thisMonth).length;
  let html=`<div class="head"><div><h1>営業活動・分析</h1>
    <div class="desc">送付（パンフ郵送・メール）／オンライン商談／議事録の横断分析（${new Date().toLocaleDateString('ja-JP')}時点）</div></div></div>`;
  // filters
  html+=`<div class="toolbar">
    <select onchange="fInsInd=this.value;render()"><option value="">全業種</option>`+INDS.map(i=>`<option ${fInsInd===i?'selected':''}>${i}</option>`).join('')+`</select>
    <select onchange="fInsMem=this.value;render()"><option value="">全担当</option>`+state.members.map(m=>`<option ${fInsMem===m?'selected':''}>${esc(m)}</option>`).join('')+`</select></div>`;
  html+=`<div class="kpis">
    <div class="kpi"><div class="lbl">送付準備中</div><div class="num" style="color:var(--s2)">${prep}<small>件</small></div></div>
    <div class="kpi"><div class="lbl">今月の送付（郵送+メール）</div><div class="num">${sentMonth}<small>件</small></div></div>
    <div class="kpi"><div class="lbl">今月のオンライン商談</div><div class="num">${meetMonth}<small>件</small></div></div>
    <div class="kpi"><div class="lbl">議事録（累計）</div><div class="num">${mins.length}<small>件</small></div></div>
  </div>`;
  // 種別×状態
  const kinds=['パンフ郵送','メール','オンライン商談'];
  html+=`<div class="panel"><h2>送付・商談 件数（種別×状態）</h2>
    <table><thead><tr><th>種別</th><th>準備中</th><th>送付/実施済</th><th>合計</th></tr></thead><tbody>`;
  kinds.forEach(k=>{const ck=comms.filter(c=>c.kind===k);const p=ck.filter(c=>c.status==='準備').length;
    html+=`<tr><td><b>${k}</b></td><td>${p}</td><td>${ck.length-p}</td><td>${ck.length}</td></tr>`;});
  html+=`</tbody></table></div>`;
  // 担当別
  const mem={};state.members.forEach(m=>mem[m]={sent:0,meet:0,min:0});
  comms.forEach(c=>{const who=c.assignee||c.leader;if(who&&mem[who]){if(c.kind==='オンライン商談'){if(c.status==='実施済')mem[who].meet++;}else if(c.status!=='準備')mem[who].sent++;}});
  mins.forEach(m=>{const who=m.assignee||m.leader;if(who&&mem[who])mem[who].min++;});
  html+=`<div class="panel"><h2>担当別アクティビティ</h2>
    <table><thead><tr><th>担当</th><th>送付済</th><th>商談実施</th><th>議事録</th></tr></thead><tbody>`+
    state.members.map(m=>`<tr><td>${esc(m)}</td><td>${mem[m].sent}</td><td>${mem[m].meet}</td><td>${mem[m].min}</td></tr>`).join('')+
    `</tbody></table></div>`;
  // 議事録 所感分布
  const sd={};SENTIMENTS.forEach(s=>sd[s]=0);mins.forEach(m=>{if(sd[m.sentiment]!=null)sd[m.sentiment]++;});
  html+=`<div class="panel"><h2>議事録 所感分布</h2>`+
    (mins.length?SENTIMENTS.map(s=>{const n=sd[s],pct=mins.length?n/mins.length*100:0;
      return `<div style="margin-bottom:7px"><div style="font-size:12px;margin-bottom:3px">${s} <span class="muted">${n}件</span></div>
      <div class="barwrap"><span style="width:${Math.max(pct,2)}%;background:var(--accent)">${n||''}</span></div></div>`;}).join('')
    :'<div class="muted">議事録はまだありません</div>')+`</div>`;
  // 議事録 一覧（最新20）
  const ms=mins.slice().sort((a,b)=>(a.date<b.date?1:-1)).slice(0,20);
  html+=`<div class="panel"><h2>議事録（最新20件）</h2>`+
    (ms.length?`<table><thead><tr><th>日付</th><th>会社</th><th>業種</th><th>種別</th><th>所感</th><th>概要</th><th>次アクション</th></tr></thead><tbody>`+
    ms.map(m=>`<tr><td style="white-space:nowrap">${m.date||''}</td><td>${esc(m.tname)}</td><td>${esc(m.ind)}</td><td>${esc(m.kind)}</td><td style="white-space:nowrap">${esc(m.sentiment||'')}</td><td style="font-size:12px">${esc((m.summary||'').slice(0,60))}</td><td style="font-size:12px">${esc(m.next||'')}</td></tr>`).join('')+
    `</tbody></table>`:'<div class="muted">該当する議事録がありません</div>')+`</div>`;
  // 送付・商談 履歴（最新20）
  const cs=comms.slice().sort((a,b)=>(a.date<b.date?1:-1)).slice(0,20);
  html+=`<div class="panel"><h2>送付・商談 履歴（最新20件）</h2>`+
    (cs.length?`<table><thead><tr><th>日付</th><th>会社</th><th>業種</th><th>種別</th><th>状態</th><th>件名</th></tr></thead><tbody>`+
    cs.map(c=>`<tr><td style="white-space:nowrap">${c.date||''}</td><td>${esc(c.tname)}</td><td>${esc(c.ind)}</td><td>${esc(c.kind)}</td><td>${esc(c.status)}</td><td style="font-size:12px">${esc(c.subject||'')}</td></tr>`).join('')+
    `</tbody></table>`:'<div class="muted">該当する履歴がありません</div>')+`</div>`;
  return html;
}

/* ---------- init ---------- */
load();render();
